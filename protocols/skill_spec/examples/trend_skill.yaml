skill_id: trend_btc_breakout_long_v1
skill_name: BTC 突破关键位带动市场 Risk-On 做多
skill_family: trend
version: v1
status: draft

entry_conditions:
  description: BTC 突破前高或关键阻力位，伴随放量
  conditions:
    - type: price_breakout
      field: last_price
      operator: gt
      reference: recent_high_20d
    - type: volume_confirmation
      field: volume_ratio
      operator: gt
      threshold: 1.5
    - type: market_state
      allowed_states: [BULL_TREND, RANGE_NEUTRAL]

position_rules:
  initial_size_pct: 0.10
  max_size_pct: 0.25
  leverage_max: 3

add_rules:
  conditions:
    - type: pullback_to_support
      description: 回踩突破位获得支撑后加仓
  add_size_pct: 0.05

reduce_rules:
  conditions:
    - type: momentum_exhaustion
      description: 动量衰竭信号出现时减仓

exit_rules:
  take_profit:
    type: trailing
    activation_pct: 0.05
    callback_pct: 0.03
  stop_loss:
    type: fixed
    loss_pct: 0.03
  time_exit:
    max_holding_bars: 480

risk_rules:
  max_loss_per_trade_pct: 0.02
  cooldown_after_loss_bars: 24

applicable_market_states:
  - BULL_TREND
  - RANGE_NEUTRAL

input_contract:
  features_required:
    - basic_trend
    - volume_profile
    - market_regime
  events_required:
    - kline
    - trade

output_contract:
  signal_type: SignalEvent
  direction: LONG

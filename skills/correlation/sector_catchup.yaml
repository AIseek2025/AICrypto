skill_id: correlation_sector_catchup_v1
skill_name: 龙头启动后同板块补涨
skill_family: correlation
version: v1
status: draft

entry_conditions:
  description: 板块龙头已启动上涨，同板块未启动标的有补涨机会
  checks:
    - type: sector_leader_active
      description: 板块龙头已有显著涨幅
    - type: lagging_price
      field: pct_from_high_20d
      operator: lt
      threshold: -0.05
    - type: volume_starting
      field: volume_ratio_5
      operator: gt
      threshold: 1.2
    - type: not_overbought
      field: rsi_14
      operator: lt
      threshold: 65.0

position_rules:
  initial_size_pct: 0.05
  max_size_pct: 0.12
  leverage_max: 2

exit_rules:
  take_profit:
    type: trailing
    activation_pct: 0.04
    callback_pct: 0.025
  stop_loss:
    type: fixed
    max_loss_pct: 0.03
  time_exit:
    max_holding_bars: 200

risk_rules:
  max_loss_per_trade_pct: 0.015
  max_correlated_exposure_pct: 0.25
  cooldown_after_loss_bars: 36

applicable_market_states:
  - BULL_TREND
  - RANGE_NEUTRAL

input_contract:
  features_required:
    - pct_from_high_20d
    - volume_ratio_5
    - rsi_14
    - sma_20
    - bb_position
  events_required:
    - kline

output_contract:
  signal_type: entry
  direction: LONG
  horizon: swing

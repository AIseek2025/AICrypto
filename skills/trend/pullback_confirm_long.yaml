skill_id: trend_pullback_confirm_long_v1
skill_name: 龙头二次回踩确认继续趋势
skill_family: trend
version: v1
status: draft

entry_conditions:
  description: 上升趋势中回踩均线获得支撑，二次确认后做多
  checks:
    - type: above_ma
      field: price_above_sma20
      operator: eq
      value: true
    - type: ma_support
      field: bb_position
      operator: gt
      threshold: 0.3
    - type: ma_slope_positive
      field: ma20_slope
      operator: gt
      threshold: 0.0
    - type: rsi_not_overbought
      field: rsi_14
      operator: lt
      threshold: 70.0
    - type: rsi_not_oversold
      field: rsi_14
      operator: gt
      threshold: 40.0

position_rules:
  initial_size_pct: 0.08
  max_size_pct: 0.20
  leverage_max: 3

exit_rules:
  take_profit:
    type: trailing
    activation_pct: 0.04
    callback_pct: 0.02
  stop_loss:
    type: atr_based
    atr_multiplier: 2.0
    max_loss_pct: 0.03
  time_exit:
    max_holding_bars: 360

risk_rules:
  max_loss_per_trade_pct: 0.015
  cooldown_after_loss_bars: 24

applicable_market_states:
  - BULL_TREND

input_contract:
  features_required:
    - sma_20
    - sma_50
    - ma20_slope
    - bb_position
    - rsi_14
    - atr_14
  events_required:
    - kline

output_contract:
  signal_type: entry
  direction: LONG
  horizon: swing

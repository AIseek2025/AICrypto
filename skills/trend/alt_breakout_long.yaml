skill_id: trend_alt_breakout_long_v1
skill_name: 山寨币平台突破主升浪启动
skill_family: trend
version: v1
status: draft

entry_conditions:
  description: 山寨币突破 20 周期横盘区间上沿，放量突破
  checks:
    - type: price_breakout
      field: close
      operator: gt
      reference: high_20d
    - type: bb_squeeze_expansion
      field: bb_width
      operator: gt
      threshold_percentile: 80
    - type: volume_surge
      field: volume_ratio_20
      operator: gt
      threshold: 2.0
    - type: not_overbought
      field: rsi_14
      operator: lt
      threshold: 75.0

position_rules:
  initial_size_pct: 0.05
  max_size_pct: 0.15
  leverage_max: 2

exit_rules:
  take_profit:
    type: fixed_ratio
    target_pct: 0.10
  stop_loss:
    type: atr_based
    atr_multiplier: 2.5
    max_loss_pct: 0.04
  time_exit:
    max_holding_bars: 240

risk_rules:
  max_loss_per_trade_pct: 0.02
  cooldown_after_loss_bars: 48

applicable_market_states:
  - BULL_TREND
  - BULL_EUPHORIA

input_contract:
  features_required:
    - high_20d
    - bb_width
    - volume_ratio_20
    - rsi_14
    - atr_14
  events_required:
    - kline

output_contract:
  signal_type: entry
  direction: LONG
  horizon: swing

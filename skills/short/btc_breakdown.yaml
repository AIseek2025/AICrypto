skill_id: short_btc_breakdown_v1
skill_name: BTC 关键支撑失守后全市场 Risk-Off 做空
skill_family: short
version: v1
status: draft

entry_conditions:
  description: BTC 跌破 20 周期低点，伴随放量恐慌
  checks:
    - type: price_breakdown
      field: close
      operator: lt
      reference: low_20d
    - type: volume_surge
      field: volume_ratio_5
      operator: gt
      threshold: 2.0
    - type: bearish_trend
      field: ma20_slope
      operator: lt
      threshold: 0.0
    - type: not_oversold
      field: rsi_14
      operator: gt
      threshold: 25.0

position_rules:
  initial_size_pct: 0.08
  max_size_pct: 0.20
  leverage_max: 2

exit_rules:
  take_profit:
    type: trailing
    activation_pct: 0.04
    callback_pct: 0.02
  stop_loss:
    type: fixed
    max_loss_pct: 0.03
  time_exit:
    max_holding_bars: 240

risk_rules:
  max_loss_per_trade_pct: 0.02
  cooldown_after_loss_bars: 48

applicable_market_states:
  - RISK_OFF
  - PANIC_SELL

input_contract:
  features_required:
    - low_20d
    - volume_ratio_5
    - ma20_slope
    - rsi_14
    - atr_14
  events_required:
    - kline

output_contract:
  signal_type: entry
  direction: SHORT
  horizon: swing

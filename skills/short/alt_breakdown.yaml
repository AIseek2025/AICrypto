skill_id: short_alt_breakdown_v1
skill_name: 山寨破位反抽做空
skill_family: short
version: v1
status: draft

entry_conditions:
  description: 山寨币跌破支撑后反抽确认，做空
  checks:
    - type: price_breakdown
      field: close
      operator: lt
      reference: low_20d
    - type: bearish_trend
      field: ma20_slope
      operator: lt
      threshold: 0.0
    - type: volume_confirmation
      field: volume_ratio_5
      operator: gt
      threshold: 1.3
    - type: macd_bearish
      field: macd_hist
      operator: lt
      threshold: 0.0

position_rules:
  initial_size_pct: 0.05
  max_size_pct: 0.15
  leverage_max: 2

exit_rules:
  take_profit:
    type: fixed_ratio
    target_pct: 0.08
  stop_loss:
    type: atr_based
    atr_multiplier: 2.0
    max_loss_pct: 0.04
  time_exit:
    max_holding_bars: 168

risk_rules:
  max_loss_per_trade_pct: 0.02
  cooldown_after_loss_bars: 48

applicable_market_states:
  - RISK_OFF
  - RANGE_NEUTRAL

input_contract:
  features_required:
    - low_20d
    - ma20_slope
    - volume_ratio_5
    - macd_hist
    - atr_14
  events_required:
    - kline

output_contract:
  signal_type: entry
  direction: SHORT
  horizon: swing
